<!DOCTYPE html>
<html>
<head>
    <title>Loan EMI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="sidebar">
    <h2>🏦 Bank App</h2>
    <a href="/">🏠 Dashboard</a>
    <a href="/add_customer">➕ Add Customer</a>
    <a href="/open_account">💳 Open Account</a>
    <a href="/deposit">💰 Deposit</a>
    <a href="/withdraw">🏧 Withdraw</a>
    <a href="/loan">📄 Loan</a>
</div>

<div class="main">
    <div class="form-box">
        <h2>Loan EMI Calculator</h2>

        <form method="POST">
            <input type="number" name="principal" placeholder="Principal Amount" required>
            <input type="number" name="rate" placeholder="Interest Rate (%)" required>
            <input type="number" name="months" placeholder="Months" required>

            <button type="submit">Calculate EMI</button>
        </form>

        {% if emi %}
            <h3 style="margin-top:15px;">EMI: ₹ {{ emi }}</h3>
        {% endif %}

        <a href="/" class="btn">⬅ Back</a>
    </div>
</div>

</body>
</html>
